<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이동 중...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      max-width: 340px;
      width: 90%;
    }
    .icon { font-size: 3.5rem; margin-bottom: 1rem; }
    h2 { color: #c00; font-size: 1.3rem; margin-bottom: 0.5rem; }
    p { color: #888; font-size: 0.9rem; line-height: 1.6; }
    .bar-wrap {
      background: #f0f0f0;
      border-radius: 99px;
      height: 6px;
      margin: 1.5rem 0;
      overflow: hidden;
    }
    .bar {
      height: 100%;
      background: linear-gradient(90deg, #c00, #ff4444);
      border-radius: 99px;
      width: 0%;
      transition: width 0.1s linear;
    }
    .btn {
      display: inline-block;
      padding: 0.85rem 2.2rem;
      background: #c00;
      color: white;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      margin-top: 0.5rem;
    }
    .btn:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🛒</div>
    <h2 id="title">이동 중...</h2>
    <p id="desc">잠시만 기다려 주세요.</p>
    <div class="bar-wrap"><div class="bar" id="bar"></div></div>
    <p style="font-size:0.82rem; color:#bbb;">이동이 안 되면 아래 버튼을 눌러주세요</p>
    <br>
    <a class="btn" id="manual-btn" href="#">바로가기 →</a>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const encoded = params.get('u');

      if (!encoded) {
        document.getElementById('icon').textContent = '❌';
        document.getElementById('title').textContent = '링크 오류';
        document.getElementById('desc').textContent = '유효하지 않은 링크입니다.';
        return;
      }

      const targetURL = decodeURIComponent(encoded);
      document.getElementById('manual-btn').href = targetURL;

      const ua = navigator.userAgent.toLowerCase();
      const isAndroid = /android/.test(ua);

      // 프로그레스 바
      let progress = 0;
      const barEl = document.getElementById('bar');
      const timer = setInterval(() => {
        progress += 10;
        barEl.style.width = Math.min(progress, 100) + '%';
        if (progress >= 100) clearInterval(timer);
      }, 50);

      // ✅ 모든 URL을 외부 브라우저로 이동
      // Android: Intent로 외부 브라우저 강제 실행
      // iOS/PC: 그냥 이동 (틱톡 iOS는 원래 외부 브라우저로 잘 빠져나감)
      if (isAndroid) {
        const intentUrl =
          'intent://' + targetURL.replace(/^https?:\/\//, '') +
          '#Intent;' +
          'scheme=https;' +
          'action=android.intent.action.VIEW;' +
          'category=android.intent.category.BROWSABLE;' +
          'S.browser_fallback_url=' + encodeURIComponent(targetURL) + ';' +
          'end';
        window.location.href = intentUrl;

      } else {
        window.location.href = targetURL;
      }

    })();
  </script>
</body>
</html>
